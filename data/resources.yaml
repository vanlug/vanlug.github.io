learning:
  beginner:
    - title: "Linux Foundation: Intro to Linux"
      url: https://training.linuxfoundation.org/training/introduction-to-linux/
      note: "free course, optional certification"
    - title: "freeCodeCamp Linux Crash Course"
      url: https://youtu.be/ROjZy1WbCIA
      note: "video, beginner-friendly"
    - title: "freeCodeCamp Introduction"
      url: https://youtu.be/sWbUDq4S6Y8
      note: "updated 2023 post-install course"
    - title: "r/linux4noobs"
      url: https://www.reddit.com/r/linux4noobs/
      note: "no-judgement community Q&A"
    - title: "University of Surrey UNIX Tutorials"
      url: https://www.ee.surrey.ac.uk/Teaching/Unix/index.html
      note: "eight fundamental exercises"
  intermediate:
    - title: "Linux.org Tutorials"
      url: https://linux.org/forums/#linux-tutorials.122
      note: "formal training for CS students"
    - title: "Professor Messer: CompTIA Linux+"
      url: http://www.professormesser.com/linux-plus/linux-training-videos/
      note: "free certification prep videos"
    - title: "IBM: Linux Kernel Tutorial"
      url: http://www.ibm.com/developerworks/linux/tutorials/l-lpic2201/
      note: "LPI exam prep"
    - title: "UC Davis: Linux/Unix Tutorial Center"
      url: http://heather.cs.ucdavis.edu/~matloff/unix.html
      note: "Professor Matloff"
    - title: "Linuxtopia: Linux Security for Beginners"
      url: http://www.linuxtopia.org/LinuxSecurity/index.html
  distros:
    - title: "Introduction to Ubuntu Linux"
      url: https://youtu.be/BMGixkvJ-6w
    - title: "Introduction to Fedora Linux"
      url: https://youtu.be/g5d0dfq_Ew8
      extra:
        title: "v38 update"
        url: https://youtu.be/f-CkvPNJ4iM
    - title: "From Windows to Linux: Transitioning to Ubuntu"
      url: https://youtu.be/P9a0TALERK8
    - title: "KDE Desktop Environment for Linux Users"
      url: https://youtu.be/cN6DBsuvcpU
    - title: "How to Install Linux in a VMware VM"
      url: https://docs.vmware.com/en/VMware-Horizon/2303/linux-desktops-setup/GUID-51C371A9-4D76-4A8C-8645-909E93080B4F.html

